<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <title>PokéCollectr</title>
  <link rel="manifest" href="#" id="manifest-placeholder" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script>
    const manifest={name:"PokéCollectr",short_name:"PokéCollectr",description:"Personal Pokémon TCG collection tracker",start_url:"./",display:"standalone",background_color:"#000000",theme_color:"#000000",orientation:"portrait-primary",icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#000"/><text x="256" y="340" font-size="320" text-anchor="middle" fill="#4ecca3">⬤</text></svg>'),sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    document.getElementById("manifest-placeholder").href=URL.createObjectURL(blob);
    const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method==='GET')e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    const swBlob=new Blob([swCode],{type:"application/javascript"});
    if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:"./"}).catch(()=>{}));
    let dp=null;
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;const b=document.getElementById("pwa-btn");if(b)b.style.display="block";});
    window.addEventListener("appinstalled",()=>{dp=null;const b=document.getElementById("pwa-btn");if(b)b.style.display="none";});
    window.triggerInstall=()=>{if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;});}};
  </script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    html{background:#000;height:100%;overflow:hidden;}
    body{background:#000;height:100%;overflow:hidden;padding-top:env(safe-area-inset-top);}
    #root{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;overflow:hidden;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .fade-up{animation:fadeUp 0.25s ease both}
    .cam-pulse{animation:pulse 2.5s ease infinite}
    .tap{transition:transform 0.12s,opacity 0.12s;cursor:pointer;}
    .tap:active{transform:scale(0.94);opacity:0.75;}
    .nav-i{transition:color 0.15s;cursor:pointer;}
    ::-webkit-scrollbar{display:none;}
    input,select{outline:none;-webkit-appearance:none;}
    input::placeholder{color:#3a3a3a;}
    .ts{background:linear-gradient(90deg,#4ecca3,#81e6d9,#4ecca3);background-size:200% 100%;animation:shimmer 2s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .bnav{background:#000!important;border-top:1px solid #1a1a1a;display:flex;align-items:center;padding:8px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom));flex-shrink:0;z-index:50;}
    .bnav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom);background:#000;z-index:49;}
    .pill{display:flex;background:#111;border-radius:24px;padding:3px;border:1px solid #1e1e1e;}
    .po{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;}
    .pa{background:#4ecca3;color:#000;}
    .pi{background:transparent;color:#555;}
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;}
    .chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all 0.15s;}
    .ca{background:#4ecca3;color:#000;}
    .ci{background:#111;color:#555;border:1px solid #222;}
    .trow{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity 0.12s;}
    .trow:active{opacity:0.7;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useMemo,useEffect}=React;

// ── APIs ──────────────────────────────────────────────────────────────────────
async function tcgSearch(q){try{const r=await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"&pageSize=20&orderBy=-set.releaseDate`);const d=await r.json();return d.data||[];}catch{return[];}}
// ── TREND DATA FETCHERS ───────────────────────────────────────────────────────
// Fetch multiple rarity buckets in parallel for real populated data
async function fetchTrendData(){
  const queries=[
    `rarity:"Special Illustration Rare"`,
    `rarity:"Hyper Rare"`,
    `rarity:"Secret Rare"`,
    `rarity:"Illustration Rare"`,
    `rarity:"Ultra Rare"`,
  ];
  const results=await Promise.all(queries.map(async q=>{
    try{
      const r=await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(q)}&pageSize=24&orderBy=-set.releaseDate`);
      const d=await r.json();return d.data||[];
    }catch{return[];}
  }));
  // Flatten, dedupe by id, enrich with price metrics
  const seen=new Set();
  const all=results.flat().filter(c=>{if(seen.has(c.id))return false;seen.add(c.id);return true;});
  return all.map(c=>{
    const p=c.tcgplayer?.prices;
    const v=p?.holofoil||p?.["1stEditionHolofoil"]||p?.normal||p?.reverseHolofoil;
    if(!v?.market)return null;
    const low=v.low||v.market*0.7;
    const high=v.high||v.market*1.3;
    const spread=high-low;
    const spreadPct=low>0?(spread/low)*100:0;
    // Price vs midpoint: above mid = "gaining" territory, below = "softening"
    const mid=(low+high)/2;
    const vsLow=low>0?((v.market-low)/low)*100:0;
    const vsHigh=high>0?((v.market-high)/high)*100:0; // negative = below high
    return{...c,_v:{...v,low,high},_spread:spreadPct,_vsLow:vsLow,_vsHigh:vsHigh,_market:v.market,_spread$:spread};
  }).filter(Boolean);
}

// Fetch top cards by raw market value across all rarities
async function fetchTopValue(){
  try{
    const r=await fetch(`https://api.pokemontcg.io/v2/cards?q=rarity:"Special Illustration Rare" OR rarity:"Hyper Rare" OR rarity:"Secret Rare" OR rarity:"Ultra Rare" OR rarity:"Illustration Rare"&pageSize=50&orderBy=-set.releaseDate`);
    const d=await r.json();
    return(d.data||[]).map(c=>{
      const p=c.tcgplayer?.prices;
      const v=p?.holofoil||p?.["1stEditionHolofoil"]||p?.normal||p?.reverseHolofoil;
      if(!v?.market)return null;
      return{...c,_market:v.market,_v:v};
    }).filter(Boolean).sort((a,b)=>b._market-a._market);
  }catch{return[];}
}

// ── TRENDS TAB ────────────────────────────────────────────────────────────────
function TrendsTab({collection,onTap}){
  const [mode,setMode]=useState("global");
  const [fmt,setFmt]=useState("pct");
  const [filter,setFilter]=useState("highest");
  const [data,setData]=useState([]);
  const [topVal,setTopVal]=useState([]);
  const [loading,setLoading]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    if(mode!=="global"||loaded)return;
    setLoading(true);
    Promise.all([fetchTrendData(),fetchTopValue()]).then(([td,tv])=>{
      setData(td);setTopVal(tv);setLoading(false);setLoaded(true);
    });
  },[mode,loaded]);

  const sorted=useMemo(()=>{
    if(filter==="highest")return[...topVal].slice(0,25);
    if(filter==="volatile")return[...data].sort((a,b)=>b._spread-a._spread).slice(0,25);
    if(filter==="nearHigh")return[...data].filter(c=>c._vsHigh>-10).sort((a,b)=>b._market-a._market).slice(0,25);
    if(filter==="softening")return[...data].filter(c=>c._vsHigh<-20).sort((a,b)=>a._vsHigh-b._vsHigh).slice(0,25);
    return topVal.slice(0,25);
  },[data,topVal,filter]);

  // My collection enriched
  const myMovers=useMemo(()=>collection.filter(e=>e.tcgCard).map(e=>{
    const p=e.tcgCard.tcgplayer?.prices;
    const v=p?.holofoil||p?.["1stEditionHolofoil"]||p?.normal||p?.reverseHolofoil;
    if(!v?.market)return null;
    const low=v.low||v.market*0.7;
    const high=v.high||v.market*1.3;
    const vsLow=low>0?((v.market-low)/low)*100:0;
    const vsHigh=high>0?((v.market-high)/high)*100:0;
    const spread$=high-low;
    return{...e,_v:{...v,low,high},_vsLow:vsLow,_vsHigh:vsHigh,_market:v.market,_spread$:spread$};
  }).filter(Boolean),[collection]);

  const myByVal=useMemo(()=>[...myMovers].sort((a,b)=>b._market-a._market),[myMovers]);
  const myHot=useMemo(()=>[...myMovers].sort((a,b)=>b._vsLow-a._vsLow).slice(0,10),[myMovers]);
  const mySoft=useMemo(()=>[...myMovers].sort((a,b)=>a._vsHigh-b._vsHigh).slice(0,10),[myMovers]);

  const fmtChg=(pct,dollar)=>{
    if(fmt==="pct")return{val:`${pct>=0?"+":""}${pct.toFixed(1)}%`,col:pct>=0?"#4ecca3":"#f87171"};
    const a=Math.abs(dollar);return{val:`${dollar>=0?"+":"-"}$${a.toFixed(2)}`,col:dollar>=0?"#4ecca3":"#f87171"};
  };

  const FILTERS=[
    ["highest","💎 Most Valuable"],
    ["volatile","⚡ Most Volatile"],
    ["nearHigh","🔥 Near 52w High"],
    ["softening","📉 Price Softening"],
  ];

  const MY_FILTERS=[["value","💎 By Value"],["hot","🔥 Trading High"],["soft","📉 Softening"]];
  const [myFilter,setMyFilter]=useState("value");

  const myList=myFilter==="value"?myByVal:myFilter==="hot"?myHot:mySoft;

  return(
    <div style={{padding:"22px 18px 16px"}} className="fade-up">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:2}}>TRENDS</div>
        <div className="pill">
          <button className={`po ${fmt==="pct"?"pa":"pi"}`} onClick={()=>setFmt("pct")}>%</button>
          <button className={`po ${fmt==="dollar"?"pa":"pi"}`} onClick={()=>setFmt("dollar")}>$</button>
        </div>
      </div>

      {/* Mode toggle */}
      <div className="pill" style={{marginBottom:14,borderRadius:12}}>
        <button className={`po ${mode==="global"?"pa":"pi"}`} style={{flex:1,borderRadius:10}} onClick={()=>setMode("global")}>🌍 Market</button>
        <button className={`po ${mode==="mine"?"pa":"pi"}`} style={{flex:1,borderRadius:10}} onClick={()=>setMode("mine")}>📦 My Cards</button>
      </div>

      {/* ── GLOBAL ── */}
      {mode==="global"&&<>
        <div className="chips">
          {FILTERS.map(([id,label])=>(
            <button key={id} className={`chip ${filter===id?"ca":"ci"}`} onClick={()=>setFilter(id)}>{label}</button>
          ))}
        </div>

        {/* Legend */}
        <div style={{background:"#080808",border:"1px solid #1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#555",lineHeight:1.6}}>
          {filter==="highest"&&"💎 Top cards ranked by current TCGPlayer market price — the most valuable cards in the game right now."}
          {filter==="volatile"&&"⚡ Cards with the biggest gap between their lowest and highest recent sale — high activity, unpredictable pricing."}
          {filter==="nearHigh"&&"🔥 Cards trading within 10% of their recent high — strong demand, buyers paying close to peak price."}
          {filter==="softening"&&"📉 Cards trading 20%+ below their recent high — price has cooled, potential buy opportunities."}
        </div>

        {loading&&<div style={{textAlign:"center",padding:40}}><Spin/><div style={{color:"#4ecca3",fontSize:13,marginTop:14}}>Loading market data…</div></div>}

        {!loading&&sorted.length===0&&loaded&&(
          <div style={{textAlign:"center",padding:40,color:"#444"}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div>No cards match this filter right now</div>
          </div>
        )}

        {!loading&&sorted.map((card,i)=>{
          const v=card._v||card.tcgplayer?.prices?.holofoil||card.tcgplayer?.prices?.normal;
          if(!v)return null;
          const market=card._market||v.market;
          const low=card._v?.low||v.low||market*0.7;
          const high=card._v?.high||v.high||market*1.3;
          // What we show depends on filter
          let badge=null;
          let pct=0,dollar=0;
          if(filter==="highest"){pct=low>0?((market-low)/low)*100:0;dollar=market-low;badge=null;}
          if(filter==="volatile"){pct=card._spread||0;dollar=card._spread$||0;badge="spread";}
          if(filter==="nearHigh"){pct=card._vsHigh||0;dollar=market-high;badge="vs high";}
          if(filter==="softening"){pct=card._vsHigh||0;dollar=market-high;badge="vs high";}
          const {val,col}=fmtChg(pct,dollar);
          return(
            <div key={card.id} className="trow" onClick={()=>onTap(card)}>
              <div style={{color:"#2a2a2a",fontSize:11,width:18,fontWeight:700,flexShrink:0,textAlign:"center"}}>#{i+1}</div>
              <img src={card.images?.small} alt="" style={{width:42,borderRadius:6,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,color:"#ddd",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.name}</div>
                <div style={{color:"#555",fontSize:11,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.set?.name}</div>
                {card.rarity&&<div style={{marginTop:3}}><Tag label={card.rarity} color={rc(card.rarity)}/></div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0,minWidth:70}}>
                <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{fmtUSD(market)}</div>
                {filter!=="highest"&&<div style={{color:col,fontSize:11,fontWeight:600,marginTop:2}}>{val} {badge&&<span style={{color:"#333",fontWeight:400}}>({badge})</span>}</div>}
                {filter==="highest"&&<div style={{color:"#555",fontSize:10,marginTop:2}}>L {fmtUSD(low)} · H {fmtUSD(high)}</div>}
              </div>
            </div>
          );
        })}
      </>}

      {/* ── MY CARDS ── */}
      {mode==="mine"&&<>
        {collection.length===0&&(
          <div style={{textAlign:"center",padding:48,color:"#444"}}>
            <div style={{fontSize:36,marginBottom:10}}>📦</div>
            <div style={{fontSize:14}}>Add cards to your collection first</div>
          </div>
        )}
        {collection.length>0&&<>
          <div className="chips">
            {MY_FILTERS.map(([id,label])=>(
              <button key={id} className={`chip ${myFilter===id?"ca":"ci"}`} onClick={()=>setMyFilter(id)}>{label}</button>
            ))}
          </div>
          <div style={{background:"#080808",border:"1px solid #1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#555",lineHeight:1.6}}>
            {myFilter==="value"&&"💎 Your most valuable cards ranked by current market price."}
            {myFilter==="hot"&&"🔥 Your cards trading closest to their recent high — strong demand right now."}
            {myFilter==="soft"&&"📉 Your cards furthest below their recent high — prices have cooled since peak."}
          </div>
          {myList.length===0&&<div style={{textAlign:"center",padding:28,color:"#444",fontSize:13}}>No price data available for your cards yet</div>}
          {myList.map((entry,i)=>{
            const name=entry.tcgCard?.name||entry.aiName||"Unknown";
            const img=entry.tcgCard?.images?.small;
            const market=entry._market;
            const low=entry._v.low;
            const high=entry._v.high;
            let pct=0,dollar=0;
            if(myFilter==="value"||myFilter==="hot"){pct=entry._vsLow;dollar=market-low;}
            if(myFilter==="soft"){pct=entry._vsHigh;dollar=market-high;}
            const {val,col}=fmtChg(pct,dollar);
            return(
              <div key={entry.id} className="trow">
                <div style={{color:"#2a2a2a",fontSize:11,width:18,fontWeight:700,flexShrink:0,textAlign:"center"}}>#{i+1}</div>
                {img?<img src={img} alt="" style={{width:42,borderRadius:6,flexShrink:0}}/>:<div style={{width:42,height:58,background:"#1a1a1a",borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🃏</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#ddd",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{name}</div>
                  <div style={{color:"#555",fontSize:11,marginTop:1}}>{entry.tcgCard?.set?.name||"—"}</div>
                  <div style={{color:"#333",fontSize:10}}>{entry.condition||"—"}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,minWidth:70}}>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{fmtUSD(market)}</div>
                  {myFilter!=="value"&&<div style={{color:col,fontSize:11,fontWeight:600,marginTop:2}}>{val}</div>}
                  {myFilter==="value"&&<div style={{color:"#555",fontSize:10,marginTop:2}}>L {fmtUSD(low)} · H {fmtUSD(high)}</div>}
                  <div style={{color:"#2a2a2a",fontSize:10}}>cond adj: ${(market*(COND_MULT[entry.condition]||1)).toFixed(2)}</div>
                </div>
              </div>
            );
          })}
          {/* Collection summary */}
          <div style={{background:"#080808",border:"1px solid #1a1a1a",borderRadius:12,padding:14,marginTop:16}}>
            <div style={{color:"#444",fontSize:10,letterSpacing:2,marginBottom:10}}>COLLECTION PRICE RANGE</div>
            {[["Avg Market Price",`$${myMovers.length?(myMovers.reduce((s,e)=>s+e._market,0)/myMovers.length).toFixed(2):"0.00"}`,"#fff"],
              ["Highest Card",`$${myMovers.length?Math.max(...myMovers.map(e=>e._market)).toFixed(2):"0.00"}`,"#4ecca3"],
              ["Lowest Card",`$${myMovers.length?Math.min(...myMovers.map(e=>e._market)).toFixed(2):"0.00"}`,"#f87171"],
              ["Cards w/ Price Data",`${myMovers.length} / ${collection.length}`,"#a78bfa"],
            ].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #111"}}>
                <span style={{color:"#555",fontSize:12}}>{l}</span>
                <span style={{color:c,fontWeight:600,fontSize:13}}>{v}</span>
              </div>
            ))}
          </div>
        </>}
      </>}
    </div>
  );
}


// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [col,setCol]=useState(loadCol);
  const [scanImg,setScanImg]=useState(null);
  const [scanAI,setScanAI]=useState(null);
  const [scanLoad,setScanLoad]=useState(false);
  const [scanErr,setScanErr]=useState(null);
  const [mtchs,setMtchs]=useState([]);
  const [sel,setSel]=useState(null);
  const [flash,setFlash]=useState(false);
  const [ovCond,setOvCond]=useState(null);
  const [cfilt,setCfilt]=useState("");
  const [csort,setCsort]=useState("newest");
  const [viewE,setViewE]=useState(null);
  const [delC,setDelC]=useState(false);
  const [sq,setSq]=useState("");
  const [sres,setSres]=useState([]);
  const [sload,setSload]=useState(false);
  const [sdone,setSdone]=useState(false);
  const [prev,setPrev]=useState(null);
  const fRef=useRef();
  const cRef=useRef();

  const tv=useMemo(()=>col.reduce((s,e)=>s+cardVal(e.tcgCard)*(COND_MULT[e.condition]||1),0),[col]);
  const us=useMemo(()=>new Set(col.map(e=>e.tcgCard?.set?.id).filter(Boolean)).size,[col]);
  const up=useMemo(()=>new Set(col.map(e=>e.tcgCard?.name||e.aiName).filter(Boolean)).size,[col]);
  const fcol=useMemo(()=>{
    const q=cfilt.toLowerCase();
    return col.filter(e=>!q||(e.tcgCard?.name||e.aiName||"").toLowerCase().includes(q)||(e.tcgCard?.set?.name||"").toLowerCase().includes(q))
      .sort((a,b)=>{if(csort==="newest")return b.addedAt-a.addedAt;if(csort==="oldest")return a.addedAt-b.addedAt;if(csort==="name")return(a.tcgCard?.name||a.aiName||"").localeCompare(b.tcgCard?.name||b.aiName||"");if(csort==="value")return(cardVal(b.tcgCard)*(COND_MULT[b.condition]||1))-(cardVal(a.tcgCard)*(COND_MULT[a.condition]||1));return 0;});
  },[col,cfilt,csort]);
  const top5=useMemo(()=>col.filter(e=>cardVal(e.tcgCard)>0).sort((a,b)=>cardVal(b.tcgCard)-cardVal(a.tcgCard)).slice(0,5),[col]);

  const mut=useCallback(u=>{setCol(u);saveCol(u);},[]);
  const pf=useCallback(async file=>{
    if(!file||!file.type.startsWith("image/"))return;
    setScanErr(null);setScanAI(null);setMtchs([]);setSel(null);setFlash(false);setOvCond(null);
    const rd=new FileReader();
    rd.onload=async e=>{
      setScanImg(e.target.result);setScanLoad(true);setTab("scan");
      try{const b64=e.target.result.split(",")[1];const ai=await aiScan(b64);setScanAI(ai);if(ai.name){const m=await tcgSearch(ai.name);setMtchs(m);if(m.length)setSel(m[0]);}}

        <div style={{color:"#333",fontSize:10,letterSpacing:2,marginBottom:3}}>PRICES</div>
        {[["Normal",prev.tcgplayer?.prices?.normal],["Holofoil",prev.tcgplayer?.prices?.holofoil],["Reverse Holo",prev.tcgplayer?.prices?.reverseHolofoil]].map(([l,p])=><PRow key={l} label={l} p={p}/>)}
        {prev.cardmarket?.prices&&<div style={{padding:"8px 0",borderBottom:"1px solid #111",marginBottom:6,fontSize:12}}><span style={{color:"#4ecca3"}}>Trend {fmtEUR(prev.cardmarket.prices.trendPrice)}</span><span style={{color:"#444"}}> · Avg30 {fmtEUR(prev.cardmarket.prices.avg30)}</span></div>}
        {prev.tcgplayer?.url&&<a href={prev.tcgplayer.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",color:"#4ecca3",fontSize:12,margin:"6px 0 14px"}}>View on TCGPlayer →</a>}
        <button onClick={()=>{if(!inC(prev.id))addS(prev);}} style={{width:"100%",padding:13,border:"none",borderRadius:14,background:inC(prev.id)?"#0d2a1e":"#4ecca3",color:inC(prev.id)?"#4ecca3":"#000",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
          {inC(prev.id)?"✅ IN COLLECTION":"+ ADD TO COLLECTION"}
        </button>
      </Sheet>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
