<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="PokéCollectr" />
  <meta name="theme-color" content="#000000" />
  <title>PokéCollectr</title>
  <link rel="manifest" href="#" id="manifest-placeholder" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script>
    const manifest = {
      name:"PokéCollectr",short_name:"PokéCollectr",
      description:"Personal Pokémon TCG collection tracker",
      start_url:"./",display:"standalone",
      background_color:"#000000",theme_color:"#000000",
      orientation:"portrait-primary",
      icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#000"/><text x="256" y="340" font-size="320" text-anchor="middle" fill="#4ecca3">⬤</text></svg>'),sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]
    };
    const blob = new Blob([JSON.stringify(manifest)],{type:"application/json"});
    document.getElementById("manifest-placeholder").href = URL.createObjectURL(blob);
    const swCode = `
      self.addEventListener('install',e=>self.skipWaiting());
      self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
      self.addEventListener('fetch',e=>{if(e.request.method==='GET')e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});
    `;
    const swBlob = new Blob([swCode],{type:"application/javascript"});
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:"./"}).catch(()=>{}));
    }
    let deferredPrompt=null;
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById("pwa-btn");if(b)b.style.display="block";});
    window.addEventListener("appinstalled",()=>{deferredPrompt=null;const b=document.getElementById("pwa-btn");if(b)b.style.display="none";});
    window.triggerInstall=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}};
  </script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:#000 !important;height:100%;overflow:hidden;} html::after,body::after{content:"";display:block;position:fixed;bottom:0;left:0;right:0;height:120px;background:#000;z-index:-1;}
    #root{height:100%;display:flex;flex-direction:column;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .fade-up{animation:fadeUp 0.3s ease both}
    .cam-btn{animation:pulse 2.5s ease infinite}
    .card-tap{transition:transform 0.15s,opacity 0.15s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .card-tap:active{transform:scale(0.95);opacity:0.8;}
    .nav-item{transition:color 0.15s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    ::-webkit-scrollbar{display:none;}
    input,select,textarea{outline:none;-webkit-appearance:none;}
    input::placeholder{color:#444;} .bottom-nav-bg{background:#000 !important;} @supports(padding:max(0px)){.bottom-safe{padding-bottom:max(16px,env(safe-area-inset-bottom));}}
    .teal-shine{background:linear-gradient(90deg,#4ecca3,#81e6d9,#4ecca3);background-size:200% 100%;animation:shimmer 2s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useMemo,useEffect} = React;

// ── API ───────────────────────────────────────────────────────────────────────
async function tcgSearch(query){
  try{
    const r=await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(query)}"&pageSize=20&orderBy=-set.releaseDate`);
    const d=await r.json();return d.data||[];
  }catch{return[];}
}
async function aiScan(b64){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:`You are a Pokémon TCG expert. Identify this card. Respond ONLY with raw JSON:\n{"name":"Pokémon name","set":"Set name","number":"e.g. 4/102","rarity":"e.g. Holo Rare","type":"e.g. Fire","hp":null,"condition":"Mint|Near Mint|Lightly Played|Moderately Played|Heavily Played","confidence":"high|medium|low","notes":"any notes"}`}
    ]}]})
  });
  const d=await r.json();
  const txt=(d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  try{return JSON.parse(txt);}catch{return{name:null,confidence:"low",notes:"Could not identify card"};}
}

// ── Storage ───────────────────────────────────────────────────────────────────
const KEY="pokecollectr_v3";
const loadCol=()=>{try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch{return[];}};
const saveCol=c=>{try{localStorage.setItem(KEY,JSON.stringify(c));}catch{}};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtUSD=v=>v!=null?`$${parseFloat(v).toFixed(2)}`:"—";
const fmtEUR=v=>v!=null?`€${parseFloat(v).toFixed(2)}`:"—";
const cardVal=c=>{const p=c?.tcgplayer?.prices;return parseFloat(p?.holofoil?.market||p?.normal?.market||p?.reverseHolofoil?.market||p?.["1stEditionHolofoil"]?.market||0);};
const CONDITIONS=["Mint","Near Mint","Lightly Played","Moderately Played","Heavily Played"];
const COND_MULT={"Mint":1.2,"Near Mint":1.0,"Lightly Played":0.85,"Moderately Played":0.65,"Heavily Played":0.4};
const RARITY_C={"Common":"#94a3b8","Uncommon":"#4ecca3","Rare":"#fbbf24","Holo Rare":"#60a5fa","Rare Holo":"#60a5fa","Ultra Rare":"#a78bfa","Secret Rare":"#f472b6","Illustration Rare":"#fb923c","Special Illustration Rare":"#f43f5e","Hyper Rare":"#fff"};
const rc=r=>RARITY_C[r]||"#64748b";
const uid=()=>Math.random().toString(36).slice(2);

// ── Icons (inline SVG) ────────────────────────────────────────────────────────
const Icon={
  home:(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>),
  search:(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>),
  camera:(<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>),
  portfolio:(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>),
  collection:(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>),
  close:(<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>),
  plus:(<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>),
  trash:(<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>),
};

// ── Sub-components ────────────────────────────────────────────────────────────
function Tag({label,color}){
  return <span style={{display:"inline-block",background:color+"22",color,border:`1px solid ${color}44`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>{label}</span>;
}
function Spinner(){
  return <div style={{width:36,height:36,border:"3px solid #1a1a1a",borderTop:"3px solid #4ecca3",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}} />;
}
function PriceRow({label,p}){
  if(!p)return null;
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #111"}}>
      <span style={{color:"#666",fontSize:13}}>{label}</span>
      <div style={{textAlign:"right"}}>
        <div style={{color:"#4ecca3",fontWeight:600,fontSize:15}}>{fmtUSD(p.market)}</div>
        <div style={{color:"#444",fontSize:11}}>L {fmtUSD(p.low)} · H {fmtUSD(p.high)}</div>
      </div>
    </div>
  );
}

// ── MODAL wrapper ─────────────────────────────────────────────────────────────
function Modal({onClose,children,title}){
  return(
    <div style={{position:"fixed",inset:0,background:"#000b",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{background:"#111",borderRadius:"20px 20px 0 0",maxHeight:"90vh",overflowY:"auto",padding:"0 0 32px"}} className="fade-up" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 20px 16px",borderBottom:"1px solid #1a1a1a",position:"sticky",top:0,background:"#111",zIndex:1}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:20,fontWeight:700,color:"#fff",letterSpacing:1}}>{title}</div>
          <button onClick={onClose} style={{background:"#1a1a1a",border:"none",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",cursor:"pointer"}}>{Icon.close}</button>
        </div>
        <div style={{padding:"16px 20px"}}>{children}</div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [collection,setCollection]=useState(loadCol);

  // scan
  const [scanImg,setScanImg]=useState(null);
  const [scanAI,setScanAI]=useState(null);
  const [scanLoading,setScanLoading]=useState(false);
  const [scanErr,setScanErr]=useState(null);
  const [matches,setMatches]=useState([]);
  const [selMatch,setSelMatch]=useState(null);
  const [addFlash,setAddFlash]=useState(false);
  const [overrideCond,setOverrideCond]=useState(null);

  // collection
  const [colFilter,setColFilter]=useState("");
  const [colSort,setColSort]=useState("newest");
  const [viewEntry,setViewEntry]=useState(null);
  const [delConfirm,setDelConfirm]=useState(false);

  // search
  const [searchQ,setSearchQ]=useState("");
  const [searchRes,setSearchRes]=useState([]);
  const [searchLoading,setSearchLoading]=useState(false);
  const [searchDone,setSearchDone]=useState(false);
  const [previewCard,setPreviewCard]=useState(null);

  const fileRef=useRef();
  const camRef=useRef();

  const totalVal=useMemo(()=>collection.reduce((s,e)=>s+cardVal(e.tcgCard)*(COND_MULT[e.condition]||1),0),[collection]);
  const uniqueSets=useMemo(()=>new Set(collection.map(e=>e.tcgCard?.set?.id).filter(Boolean)).size,[collection]);
  const uniquePokemon=useMemo(()=>new Set(collection.map(e=>e.tcgCard?.name||e.aiName).filter(Boolean)).size,[collection]);

  const filteredCol=useMemo(()=>{
    const q=colFilter.toLowerCase();
    return collection
      .filter(e=>!q||(e.tcgCard?.name||e.aiName||"").toLowerCase().includes(q)||(e.tcgCard?.set?.name||"").toLowerCase().includes(q))
      .sort((a,b)=>{
        if(colSort==="newest")return b.addedAt-a.addedAt;
        if(colSort==="oldest")return a.addedAt-b.addedAt;
        if(colSort==="name")return(a.tcgCard?.name||a.aiName||"").localeCompare(b.tcgCard?.name||b.aiName||"");
        if(colSort==="value")return(cardVal(b.tcgCard)*(COND_MULT[b.condition]||1))-(cardVal(a.tcgCard)*(COND_MULT[a.condition]||1));
        return 0;
      });
  },[collection,colFilter,colSort]);

  const mutate=useCallback(u=>{setCollection(u);saveCol(u);},[]);

  const processFile=useCallback(async file=>{
    if(!file||!file.type.startsWith("image/"))return;
    setScanErr(null);setScanAI(null);setMatches([]);setSelMatch(null);setAddFlash(false);setOverrideCond(null);
    const reader=new FileReader();
    reader.onload=async e=>{
      setScanImg(e.target.result);
      setScanLoading(true);
      setTab("scan");
      try{
        const b64=e.target.result.split(",")[1];
        const ai=await aiScan(b64);
        setScanAI(ai);
        if(ai.name){const m=await tcgSearch(ai.name);setMatches(m);if(m.length)setSelMatch(m[0]);}
      }catch(err){setScanErr(err.message);}
      finally{setScanLoading(false);}
    };
    reader.readAsDataURL(file);
  },[]);

  const addToCol=useCallback(()=>{
    const condition=overrideCond||scanAI?.condition||"Near Mint";
    mutate([{id:uid(),addedAt:Date.now(),scanImg,aiName:scanAI?.name,condition,tcgCard:selMatch||null},...collection]);
    setAddFlash(true);setTimeout(()=>setAddFlash(false),2200);
  },[scanImg,scanAI,selMatch,overrideCond,collection,mutate]);

  const removeEntry=useCallback(id=>{mutate(collection.filter(e=>e.id!==id));setViewEntry(null);setDelConfirm(false);},[collection,mutate]);
  const updateCond=useCallback((id,c)=>{mutate(collection.map(e=>e.id===id?{...e,condition:c}:e));setViewEntry(p=>p?.id===id?{...p,condition:c}:p);},[collection,mutate]);
  const inCol=useCallback(id=>collection.some(e=>e.tcgCard?.id===id),[collection]);
  const addSearchCard=useCallback(card=>{mutate([{id:uid(),addedAt:Date.now(),scanImg:null,aiName:card.name,condition:"Near Mint",tcgCard:card},...collection]);},[collection,mutate]);
  const doSearch=useCallback(async()=>{
    if(!searchQ.trim())return;
    setSearchLoading(true);setSearchDone(false);setSearchRes([]);
    const res=await tcgSearch(searchQ);
    setSearchRes(res);setSearchLoading(false);setSearchDone(true);
  },[searchQ]);
  const resetScan=()=>{setScanImg(null);setScanAI(null);setMatches([]);setSelMatch(null);setScanErr(null);setOverrideCond(null);};

  // top value cards for portfolio
  const topCards=useMemo(()=>collection.filter(e=>cardVal(e.tcgCard)>0).sort((a,b)=>cardVal(b.tcgCard)-cardVal(a.tcgCard)).slice(0,5),[collection]);

  // ── NAV CONFIG
  const navItems=[
    {id:"home",label:"Home",icon:Icon.home},
    {id:"search",label:"Search",icon:Icon.search},
    {id:"scan",label:"Scan",icon:Icon.camera,center:true},
    {id:"collection",label:"Collection",icon:Icon.collection},
    {id:"portfolio",label:"Portfolio",icon:Icon.portfolio},
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000",fontFamily:"'Inter',sans-serif",color:"#fff",overflow:"hidden",position:"fixed",inset:0}}>

      {/* ── SCREENS ── */}
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>

        {/* ════ HOME ════ */}
        {tab==="home"&&(
          <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"60px 24px 32px"}}>
            {/* Logo */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:12,color:"#555",letterSpacing:4,marginBottom:8,fontWeight:500}}>WELCOME TO</div>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:56,fontWeight:700,letterSpacing:4,lineHeight:1,color:"#fff",textTransform:"uppercase"}}>
                PokéCollectr
              </div>
              <div style={{fontSize:11,letterSpacing:6,color:"#4ecca3",marginTop:8,fontWeight:600}}>COLLECT · TRACK · PROFIT</div>
            </div>

            {/* Stats or empty state */}
            {collection.length===0?(
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:600,color:"#fff",marginBottom:10}}>Start building your Collection!</div>
                <div style={{fontSize:14,color:"#555",lineHeight:1.6}}>Tap the camera below to scan<br/>your first card</div>
              </div>
            ):(
              <div style={{width:"100%",maxWidth:360}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                  {[
                    ["Total Cards",collection.length],
                    ["Est. Value",`$${totalVal.toFixed(2)}`],
                    ["Unique Sets",uniqueSets],
                    ["Unique Pokémon",uniquePokemon],
                  ].map(([label,val])=>(
                    <div key={label} style={{background:"#111",borderRadius:14,padding:"16px 14px",border:"1px solid #1a1a1a"}}>
                      <div className="teal-shine" style={{fontFamily:"'Rajdhani',sans-serif",fontSize:26,fontWeight:700,letterSpacing:1}}>{val}</div>
                      <div style={{color:"#555",fontSize:12,marginTop:2}}>{label}</div>
                    </div>
                  ))}
                </div>
                {topCards.length>0&&(
                  <div style={{marginTop:4}}>
                    <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:8}}>TOP CARDS</div>
                    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                      {topCards.map(e=>(
                        <div key={e.id} className="card-tap" onClick={()=>{setViewEntry(e);}} style={{flexShrink:0,width:72}}>
                          {e.tcgCard?.images?.small
                            ?<img src={e.tcgCard.images.small} style={{width:"100%",borderRadius:8,display:"block"}} alt="" />
                            :<div style={{width:72,height:100,background:"#1a1a1a",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🃏</div>}
                          <div style={{color:"#4ecca3",fontSize:10,textAlign:"center",marginTop:3}}>${(cardVal(e.tcgCard)*(COND_MULT[e.condition]||1)).toFixed(0)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Camera CTA */}
            <div style={{textAlign:"center"}}>
              <div className="cam-btn" onClick={()=>camRef.current?.click()} style={{width:72,height:72,borderRadius:"50%",background:"#1a1a1a",border:"2px solid #333",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto 16px",color:"#4ecca3"}}>
                {Icon.camera}
              </div>
              <div style={{fontSize:13,color:"#444"}}>Tap to scan a card</div>
            </div>

            <button id="pwa-btn" onClick={()=>window.triggerInstall&&window.triggerInstall()}
              style={{display:"none",background:"#4ecca3",color:"#000",border:"none",borderRadius:30,padding:"10px 24px",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
              ⬇ INSTALL APP
            </button>
          </div>
        )}

        {/* ════ SCAN ════ */}
        {tab==="scan"&&(
          <div style={{padding:"24px 20px 20px"}} className="fade-up">
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:2,marginBottom:4}}>SCAN CARD</div>
            <div style={{color:"#555",fontSize:13,marginBottom:20}}>AI identifies your card and fetches live prices</div>

            {/* Drop / preview zone */}
            <div onClick={()=>fileRef.current?.click()}
              style={{background:"#0a0a0a",border:"2px dashed #222",borderRadius:16,minHeight:180,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,marginBottom:14,cursor:"pointer",overflow:"hidden"}}>
              {scanImg
                ?<img src={scanImg} alt="card" style={{maxHeight:260,maxWidth:"100%",objectFit:"contain"}} />
                :<><div style={{color:"#333",fontSize:40}}>🃏</div><div style={{color:"#444",fontSize:13}}>Tap to choose photo</div></>
              }
            </div>

            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <button onClick={()=>fileRef.current?.click()} style={{flex:1,background:"#111",border:"1px solid #222",borderRadius:12,padding:"12px 0",color:"#fff",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>📁 Gallery</button>
              <button onClick={()=>camRef.current?.click()} style={{flex:1,background:"#4ecca3",border:"none",borderRadius:12,padding:"12px 0",color:"#000",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>📷 Camera</button>
              {scanImg&&<button onClick={resetScan} style={{background:"#1a0000",border:"1px solid #3a0000",borderRadius:12,padding:"12px 14px",color:"#f87171",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>✕</button>}
            </div>

            {scanLoading&&(
              <div style={{background:"#0a0a0a",borderRadius:16,padding:32,textAlign:"center",marginBottom:14}}>
                <Spinner />
                <div style={{color:"#4ecca3",fontSize:14,marginTop:16,fontWeight:500}}>Scanning card with AI…</div>
                <div style={{color:"#444",fontSize:12,marginTop:4}}>Identifying + fetching live prices</div>
              </div>
            )}

            {scanErr&&<div style={{background:"#1a0000",border:"1px solid #3a0000",borderRadius:12,padding:14,color:"#f87171",fontSize:13,marginBottom:14}}>⚠ {scanErr}</div>}

            {/* AI result */}
            {scanAI&&!scanLoading&&(
              <div style={{background:"#0a0a0a",borderRadius:16,padding:18,marginBottom:14,border:"1px solid #1a1a1a"}} className="fade-up">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:24,fontWeight:700,letterSpacing:1}}>{scanAI.name||"Unknown"}</div>
                    {scanAI.set&&<div style={{color:"#555",fontSize:12}}>{scanAI.set}{scanAI.number?` · ${scanAI.number}`:""}</div>}
                  </div>
                  <Tag label={`${scanAI.confidence||"?"}`} color={scanAI.confidence==="high"?"#4ecca3":scanAI.confidence==="medium"?"#fbbf24":"#f87171"} />
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
                  {scanAI.rarity&&<Tag label={scanAI.rarity} color={rc(scanAI.rarity)} />}
                  {scanAI.type&&<Tag label={scanAI.type} color="#fb923c" />}
                  {scanAI.hp&&<Tag label={`HP ${scanAI.hp}`} color="#f472b6" />}
                </div>
                <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>CONDITION</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {CONDITIONS.map(c=>{
                    const active=(overrideCond||scanAI.condition)===c;
                    return<button key={c} onClick={()=>setOverrideCond(c)}
                      style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${active?"#4ecca3":"#222"}`,background:active?"#4ecca322":"transparent",color:active?"#4ecca3":"#555",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>{c}</button>;
                  })}
                </div>
              </div>
            )}

            {/* Matches */}
            {matches.length>0&&!scanLoading&&(
              <div style={{background:"#0a0a0a",borderRadius:16,padding:18,border:"1px solid #1a1a1a",marginBottom:14}} className="fade-up">
                <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:12}}>SELECT CARD</div>
                <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
                  {matches.map(m=>(
                    <div key={m.id} className="card-tap" onClick={()=>setSelMatch(m)}
                      style={{minWidth:76,flexShrink:0,borderRadius:10,overflow:"hidden",border:`2px solid ${selMatch?.id===m.id?"#4ecca3":"#1a1a1a"}`,transition:"border-color 0.15s"}}>
                      <img src={m.images?.small} alt={m.name} style={{width:"100%",display:"block"}} />
                      <div style={{padding:"3px 5px",fontSize:8,color:"#555",lineHeight:1.3,background:"#0a0a0a"}}>{m.set?.name}</div>
                    </div>
                  ))}
                </div>

                {selMatch&&(
                  <div className="fade-up">
                    <div style={{display:"flex",gap:12,marginBottom:16}}>
                      <img src={selMatch.images?.large||selMatch.images?.small} alt="" style={{width:90,borderRadius:10,flexShrink:0}} />
                      <div>
                        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,letterSpacing:1}}>{selMatch.name}</div>
                        <div style={{color:"#555",fontSize:12,marginBottom:6}}>{selMatch.set?.name} · #{selMatch.number}</div>
                        {selMatch.rarity&&<Tag label={selMatch.rarity} color={rc(selMatch.rarity)} />}
                        <div style={{marginTop:8,fontSize:12,color:"#555"}}>
                          <div>Artist: {selMatch.artist||"—"}</div>
                          <div>Released: {selMatch.set?.releaseDate||"—"}</div>
                        </div>
                      </div>
                    </div>

                    {/* Prices */}
                    {selMatch.tcgplayer?.prices&&(
                      <div style={{marginBottom:14}}>
                        <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:4}}>TCGPLAYER (USD)</div>
                        {[["Normal",selMatch.tcgplayer.prices.normal],["Holofoil",selMatch.tcgplayer.prices.holofoil],["Reverse Holo",selMatch.tcgplayer.prices.reverseHolofoil],["1st Ed.",selMatch.tcgplayer.prices["1stEditionHolofoil"]]].map(([l,p])=><PriceRow key={l} label={l} p={p} />)}
                      </div>
                    )}
                    {selMatch.cardmarket?.prices&&(
                      <div style={{marginBottom:14,padding:"10px 0",borderBottom:"1px solid #111"}}>
                        <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:4}}>CARDMARKET (EUR)</div>
                        <div style={{display:"flex",gap:16,fontSize:13}}>
                          <span style={{color:"#4ecca3"}}>Trend {fmtEUR(selMatch.cardmarket.prices.trendPrice)}</span>
                          <span style={{color:"#444"}}>Avg30 {fmtEUR(selMatch.cardmarket.prices.avg30)}</span>
                        </div>
                      </div>
                    )}

                    {/* Trade info */}
                    <div style={{background:"#050505",borderRadius:12,padding:14,marginBottom:16,border:"1px solid #1a1a1a"}}>
                      <div style={{color:"#4ecca3",fontSize:11,letterSpacing:2,fontWeight:600,marginBottom:8}}>TRADE INFO</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",fontSize:12}}>
                        {[["Series",selMatch.set?.series],["Standard",selMatch.legalities?.standard],["Expanded",selMatch.legalities?.expanded],["HP",selMatch.hp],["Retreat",selMatch.retreatCost?.length],["Set Total",selMatch.set?.total]].map(([k,v])=>(
                          <div key={k}><span style={{color:"#444"}}>{k}: </span><span style={{color:"#ccc"}}>{v||"—"}</span></div>
                        ))}
                      </div>
                      {selMatch.tcgplayer?.url&&<a href={selMatch.tcgplayer.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:10,color:"#4ecca3",fontSize:12}}>Buy on TCGPlayer →</a>}
                    </div>

                    <button onClick={addToCol}
                      style={{width:"100%",padding:14,border:"none",borderRadius:14,background:addFlash?"#1a4a3a":addFlash?"#1a4a3a":"#4ecca3",color:addFlash?"#4ecca3":"#000",fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:"pointer",transition:"all 0.3s",letterSpacing:1}}>
                      {addFlash?"✅ ADDED TO COLLECTION":"+ ADD TO COLLECTION"}
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ════ SEARCH ════ */}
        {tab==="search"&&(
          <div style={{padding:"24px 20px 20px"}} className="fade-up">
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:2,marginBottom:16}}>SEARCH</div>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              <input style={{flex:1,background:"#111",border:"1px solid #222",borderRadius:12,padding:"13px 16px",color:"#fff",fontSize:14,fontFamily:"inherit"}}
                placeholder="Charizard, Pikachu, Mewtwo…" value={searchQ}
                onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} />
              <button onClick={doSearch} style={{background:"#4ecca3",border:"none",borderRadius:12,padding:"13px 18px",color:"#000",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>Go</button>
            </div>
            {searchLoading&&<div style={{textAlign:"center",padding:40}}><Spinner /><div style={{color:"#4ecca3",fontSize:13,marginTop:16}}>Searching…</div></div>}
            {searchDone&&searchRes.length===0&&!searchLoading&&<div style={{textAlign:"center",color:"#444",padding:40}}>No results for "{searchQ}"</div>}
            {searchRes.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {searchRes.map(card=>{
                  const val=cardVal(card);
                  const owned=inCol(card.id);
                  return(
                    <div key={card.id} className="card-tap" onClick={()=>setPreviewCard(card)}
                      style={{background:"#0a0a0a",border:`1px solid ${owned?"#4ecca344":"#1a1a1a"}`,borderRadius:12,overflow:"hidden"}}>
                      <img src={card.images?.small} alt={card.name} style={{width:"100%",display:"block"}} />
                      <div style={{padding:"6px 8px"}}>
                        <div style={{fontSize:11,fontWeight:500,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.name}</div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                          <span style={{fontSize:11,color:val?"#4ecca3":"#444"}}>{val?`$${val.toFixed(2)}`:"—"}</span>
                          {owned&&<span style={{fontSize:9,color:"#4ecca3"}}>✓</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ════ COLLECTION ════ */}
        {tab==="collection"&&(
          <div style={{padding:"24px 20px 20px"}} className="fade-up">
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:2,marginBottom:16}}>MY COLLECTION</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input style={{flex:1,background:"#111",border:"1px solid #222",borderRadius:12,padding:"11px 14px",color:"#fff",fontSize:13,fontFamily:"inherit"}}
                placeholder="Filter…" value={colFilter} onChange={e=>setColFilter(e.target.value)} />
              <select style={{background:"#111",border:"1px solid #222",borderRadius:12,padding:"11px 10px",color:"#fff",fontSize:12,fontFamily:"inherit"}}
                value={colSort} onChange={e=>setColSort(e.target.value)}>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="name">Name</option>
                <option value="value">Value</option>
              </select>
            </div>
            {filteredCol.length===0
              ?<div style={{textAlign:"center",padding:60,color:"#444"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📭</div>
                  <div>{collection.length===0?"No cards yet — scan one!":"No cards match filter"}</div>
                </div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                  {filteredCol.map(entry=>{
                    const img=entry.tcgCard?.images?.small||entry.scanImg;
                    const name=entry.tcgCard?.name||entry.aiName||"Unknown";
                    const val=cardVal(entry.tcgCard)*(COND_MULT[entry.condition]||1);
                    return(
                      <div key={entry.id} className="card-tap" onClick={()=>{setViewEntry(entry);setDelConfirm(false);}}
                        style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:12,overflow:"hidden"}}>
                        {img?<img src={img} alt={name} style={{width:"100%",display:"block",aspectRatio:"0.72",objectFit:"cover"}} />
                          :<div style={{aspectRatio:"0.72",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🃏</div>}
                        <div style={{padding:"6px 8px"}}>
                          <div style={{fontSize:11,fontWeight:500,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{name}</div>
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                            <span style={{fontSize:11,color:val?"#4ecca3":"#444"}}>{val?`$${val.toFixed(2)}`:"—"}</span>
                            {entry.condition&&<span style={{fontSize:9,color:"#444"}}>{entry.condition.split(" ").map(w=>w[0]).join("")}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }
          </div>
        )}

        {/* ════ PORTFOLIO ════ */}
        {tab==="portfolio"&&(
          <div style={{padding:"24px 20px 20px"}} className="fade-up">
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:2,marginBottom:20}}>PORTFOLIO</div>
            {collection.length===0
              ?<div style={{textAlign:"center",padding:60,color:"#444"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📊</div>
                  <div>Add cards to see your portfolio</div>
                </div>
              :<>
                {/* Total value hero */}
                <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:20,padding:24,marginBottom:14,textAlign:"center"}}>
                  <div style={{color:"#555",fontSize:12,letterSpacing:2,marginBottom:8}}>TOTAL PORTFOLIO VALUE</div>
                  <div className="teal-shine" style={{fontFamily:"'Rajdhani',sans-serif",fontSize:48,fontWeight:700,letterSpacing:2}}>${totalVal.toFixed(2)}</div>
                  <div style={{color:"#444",fontSize:12,marginTop:4}}>{collection.length} cards across {uniqueSets} sets</div>
                </div>

                {/* Stats grid */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
                  {[
                    ["Cards","📦",collection.length],
                    ["Sets","🗂",uniqueSets],
                    ["Unique Pokémon","⭐",uniquePokemon],
                    ["Avg Value","💰",`$${collection.length?(totalVal/collection.length).toFixed(2):"0.00"}`],
                  ].map(([label,icon,val])=>(
                    <div key={label} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,padding:"16px 14px"}}>
                      <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
                      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:24,fontWeight:700,color:"#fff"}}>{val}</div>
                      <div style={{color:"#444",fontSize:11,marginTop:2}}>{label}</div>
                    </div>
                  ))}
                </div>

                {/* Top cards by value */}
                <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:12}}>TOP CARDS BY VALUE</div>
                {collection.filter(e=>cardVal(e.tcgCard)>0).sort((a,b)=>cardVal(b.tcgCard)-cardVal(a.tcgCard)).slice(0,10).map((entry,i)=>{
                  const val=cardVal(entry.tcgCard)*(COND_MULT[entry.condition]||1);
                  const name=entry.tcgCard?.name||entry.aiName||"Unknown";
                  const img=entry.tcgCard?.images?.small;
                  return(
                    <div key={entry.id} className="card-tap" onClick={()=>{setViewEntry(entry);setDelConfirm(false);}}
                      style={{display:"flex",alignItems:"center",gap:12,background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,padding:12,marginBottom:8}}>
                      <div style={{color:"#333",fontSize:14,width:20,textAlign:"center",fontWeight:700}}>#{i+1}</div>
                      {img?<img src={img} alt="" style={{width:44,borderRadius:6}} />:<div style={{width:44,height:60,background:"#1a1a1a",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>🃏</div>}
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14,color:"#fff"}}>{name}</div>
                        <div style={{color:"#555",fontSize:11}}>{entry.tcgCard?.set?.name||"—"} · {entry.condition||"—"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#4ecca3",fontWeight:700,fontSize:16}}>${val.toFixed(2)}</div>
                        <div style={{color:"#444",fontSize:10}}>market</div>
                      </div>
                    </div>
                  );
                })}
              </>
            }
          </div>
        )}
      </div>

      {/* ── BOTTOM NAV ── */}
      <div style={{background:"#000",borderTop:"1px solid #1a1a1a",display:"flex",alignItems:"center",padding:"8px 0",paddingBottom:"max(16px, env(safe-area-inset-bottom))",flexShrink:0,zIndex:50,position:"relative"}}>
        {navItems.map(item=>{
          const active=tab===item.id;
          if(item.center){
            return(
              <div key={item.id} style={{flex:1,display:"flex",justifyContent:"center"}}>
                <div onClick={()=>{setTab("scan");camRef.current?.click();}}
                  style={{width:56,height:56,borderRadius:"50%",background:"#4ecca3",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#000",boxShadow:"0 0 20px #4ecca340",marginTop:-16}}>
                  {Icon.camera}
                </div>
              </div>
            );
          }
          return(
            <div key={item.id} className="nav-item" onClick={()=>setTab(item.id)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0",color:active?"#4ecca3":"#444"}}>
              {item.icon}
              <span style={{fontSize:10,fontWeight:active?600:400,letterSpacing:0.5}}>{item.label}</span>
            </div>
          );
        })}
      </div>

      {/* ── Hidden inputs ── */}
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])} />
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])} />

      {/* ── COLLECTION DETAIL MODAL ── */}
      {viewEntry&&(
        <Modal title={viewEntry.tcgCard?.name||viewEntry.aiName||"Card Detail"} onClose={()=>{setViewEntry(null);setDelConfirm(false);}}>
          <div style={{display:"flex",gap:14,marginBottom:20}}>
            {(viewEntry.tcgCard?.images?.large||viewEntry.scanImg)&&
              <img src={viewEntry.tcgCard?.images?.large||viewEntry.scanImg} alt="" style={{width:120,borderRadius:12,flexShrink:0,objectFit:"contain",alignSelf:"flex-start"}} />}
            <div style={{fontSize:13,color:"#ccc"}}>
              {viewEntry.tcgCard&&<>
                <div style={{color:"#555",fontSize:11}}>SET</div><div style={{marginBottom:8}}>{viewEntry.tcgCard.set?.name}</div>
                <div style={{color:"#555",fontSize:11}}>NUMBER</div><div style={{marginBottom:8}}>{viewEntry.tcgCard.number}</div>
                <div style={{color:"#555",fontSize:11}}>RARITY</div><div style={{marginBottom:8}}><Tag label={viewEntry.tcgCard.rarity||"—"} color={rc(viewEntry.tcgCard.rarity)} /></div>
                <div style={{color:"#555",fontSize:11}}>ARTIST</div><div>{viewEntry.tcgCard.artist||"—"}</div>
              </>}
              <div style={{color:"#333",fontSize:11,marginTop:8}}>Added {new Date(viewEntry.addedAt).toLocaleDateString()}</div>
            </div>
          </div>

          <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:8}}>CONDITION</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {CONDITIONS.map(c=>{
              const active=viewEntry.condition===c;
              return<button key={c} onClick={()=>updateCond(viewEntry.id,c)}
                style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${active?"#4ecca3":"#222"}`,background:active?"#4ecca322":"transparent",color:active?"#4ecca3":"#555",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>{c}</button>;
            })}
          </div>

          {viewEntry.tcgCard?.tcgplayer?.prices&&<>
            <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:4}}>PRICES</div>
            {[["Normal",viewEntry.tcgCard.tcgplayer.prices.normal],["Holofoil",viewEntry.tcgCard.tcgplayer.prices.holofoil],["Reverse Holo",viewEntry.tcgCard.tcgplayer.prices.reverseHolofoil]].map(([l,p])=><PriceRow key={l} label={l} p={p} />)}
            <div style={{padding:"12px 0",display:"flex",justifyContent:"space-between",borderBottom:"1px solid #111",marginBottom:16}}>
              <span style={{color:"#555",fontSize:13}}>Value at {viewEntry.condition}</span>
              <span style={{color:"#4ecca3",fontWeight:700,fontSize:16}}>${(cardVal(viewEntry.tcgCard)*(COND_MULT[viewEntry.condition]||1)).toFixed(2)}</span>
            </div>
          </>}

          {viewEntry.tcgCard?.tcgplayer?.url&&<a href={viewEntry.tcgCard.tcgplayer.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",color:"#4ecca3",fontSize:13,marginBottom:16}}>View on TCGPlayer →</a>}

          {delConfirm
            ?<div style={{display:"flex",gap:8}}>
                <button onClick={()=>removeEntry(viewEntry.id)} style={{flex:1,padding:13,border:"none",borderRadius:12,background:"#3a0000",color:"#f87171",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>Confirm Remove</button>
                <button onClick={()=>setDelConfirm(false)} style={{flex:1,padding:13,border:"1px solid #222",borderRadius:12,background:"transparent",color:"#666",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>Cancel</button>
              </div>
            :<button onClick={()=>setDelConfirm(true)} style={{width:"100%",padding:13,border:"1px solid #3a0000",borderRadius:12,background:"transparent",color:"#f87171",fontFamily:"inherit",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {Icon.trash} Remove from Collection
              </button>
          }
        </Modal>
      )}

      {/* ── SEARCH CARD MODAL ── */}
      {previewCard&&(
        <Modal title={previewCard.name} onClose={()=>setPreviewCard(null)}>
          <div style={{display:"flex",gap:14,marginBottom:16}}>
            <img src={previewCard.images?.large||previewCard.images?.small} alt="" style={{width:120,borderRadius:12,flexShrink:0}} />
            <div style={{fontSize:13,color:"#ccc"}}>
              <div style={{color:"#555",fontSize:11}}>SET</div><div style={{marginBottom:6}}>{previewCard.set?.name}</div>
              <div style={{color:"#555",fontSize:11}}>NUMBER</div><div style={{marginBottom:6}}>{previewCard.number}</div>
              <div style={{color:"#555",fontSize:11}}>RARITY</div><div style={{marginBottom:6}}><Tag label={previewCard.rarity||"—"} color={rc(previewCard.rarity)} /></div>
              <div style={{color:"#555",fontSize:11}}>ARTIST</div><div>{previewCard.artist||"—"}</div>
            </div>
          </div>
          <div style={{color:"#444",fontSize:11,letterSpacing:2,marginBottom:4}}>PRICES</div>
          {[["Normal",previewCard.tcgplayer?.prices?.normal],["Holofoil",previewCard.tcgplayer?.prices?.holofoil],["Reverse Holo",previewCard.tcgplayer?.prices?.reverseHolofoil]].map(([l,p])=><PriceRow key={l} label={l} p={p} />)}
          {previewCard.cardmarket?.prices&&(
            <div style={{padding:"10px 0",borderBottom:"1px solid #111",marginBottom:8,fontSize:13}}>
              <span style={{color:"#4ecca3"}}>Trend {fmtEUR(previewCard.cardmarket.prices.trendPrice)}</span>
              <span style={{color:"#444"}}> · Avg30 {fmtEUR(previewCard.cardmarket.prices.avg30)}</span>
            </div>
          )}
          {previewCard.tcgplayer?.url&&<a href={previewCard.tcgplayer.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",color:"#4ecca3",fontSize:12,margin:"8px 0 16px"}}>View on TCGPlayer →</a>}
          <button onClick={()=>{if(!inCol(previewCard.id)){addSearchCard(previewCard);}}}
            style={{width:"100%",padding:14,border:"none",borderRadius:14,background:inCol(previewCard.id)?"#1a3a2a":"#4ecca3",color:inCol(previewCard.id)?"#4ecca3":"#000",fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
            {inCol(previewCard.id)?"✅ IN COLLECTION":"+ ADD TO COLLECTION"}
          </button>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
